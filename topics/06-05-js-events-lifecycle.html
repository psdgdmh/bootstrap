<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>06.5 JavaScript Events Lifecycle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">06.5 JavaScript Events Lifecycle</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="06-04-collapse-accordion-dropdowns.html">Previous</a><a class="btn btn-sm btn-primary" href="07-01-carousel-autoplay-controls.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4"><button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#eventModal">Open modal</button><ol id="eventLog" class="mb-0"></ol></section>
      <div class="modal fade" id="eventModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h2 class="h5 modal-title">Lifecycle</h2><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">ดู event log หลังเปิด/ปิด</div></div></div></div>
      <script>
        const log = document.getElementById('eventLog');
        const modal = document.getElementById('eventModal');
        ['show.bs.modal','shown.bs.modal','hide.bs.modal','hidden.bs.modal'].forEach(name => modal.addEventListener(name, () => { const li = document.createElement('li'); li.textContent = name; log.append(li); }));
      </script>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
