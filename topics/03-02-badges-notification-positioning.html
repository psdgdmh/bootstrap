<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>03.2 Badges and Notification Positioning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">03.2 Badges and Notification Positioning</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="03-01-buttons-button-groups.html">Previous</a><a class="btn btn-sm btn-primary" href="03-03-cards-images-overlays-groups.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4">
        <button type="button" class="btn btn-primary position-relative me-4">
          Inbox
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">99+</span>
        </button>
        <button type="button" class="btn btn-outline-dark position-relative">
          Alerts
          <span class="position-absolute top-0 start-100 translate-middle p-2 bg-success border border-light rounded-circle"></span>
        </button>
        <hr>
        <p class="mb-0">ใช้ `position-relative` ที่ parent และ `position-absolute top-0 start-100 translate-middle` ที่ badge</p>
      </section>
    </main>
  </body>
</html>
