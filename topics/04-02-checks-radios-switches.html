<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>04.2 Checks, Radios and Switches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">04.2 Checks, Radios and Switches</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="04-01-form-controls-selects.html">Previous</a><a class="btn btn-sm btn-primary" href="04-03-input-group-range-datalist.html">Next</a></div>
      </div>

      <section class="row g-4">
        <div class="col-md-4"><div class="bg-white border rounded-3 p-4 h-100"><h2 class="h5">Checkboxes</h2><div class="form-check"><input class="form-check-input" type="checkbox" id="c1" checked><label class="form-check-label" for="c1">Email updates</label></div><div class="form-check"><input class="form-check-input" type="checkbox" id="c2"><label class="form-check-label" for="c2">SMS updates</label></div></div></div>
        <div class="col-md-4"><div class="bg-white border rounded-3 p-4 h-100"><h2 class="h5">Radios</h2><div class="form-check"><input class="form-check-input" type="radio" name="plan" id="r1" checked><label class="form-check-label" for="r1">Monthly</label></div><div class="form-check"><input class="form-check-input" type="radio" name="plan" id="r2"><label class="form-check-label" for="r2">Yearly</label></div></div></div>
        <div class="col-md-4"><div class="bg-white border rounded-3 p-4 h-100"><h2 class="h5">Switches</h2><div class="form-check form-switch"><input class="form-check-input" type="checkbox" role="switch" id="s1" checked><label class="form-check-label" for="s1">Email alerts</label></div></div></div>
      </section>
    </main>
  </body>
</html>
