<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>04.1 Form Controls and Selects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">04.1 Form Controls and Selects</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="03-06-component-mashup-css-variables.html">Previous</a><a class="btn btn-sm btn-primary" href="04-02-checks-radios-switches.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label" for="email">Email</label><input id="email" type="email" class="form-control" placeholder="name@example.com"></div>
          <div class="col-md-6"><label class="form-label" for="role">Role</label><select id="role" class="form-select"><option>Admin</option><option>Editor</option><option>Viewer</option></select></div>
          <div class="col-12"><label class="form-label" for="bio">Bio</label><textarea id="bio" class="form-control" rows="4"></textarea></div>
        </div>
      </section>
    </main>
  </body>
</html>
