<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>04.4 Floating Labels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">04.4 Floating Labels</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="04-03-input-group-range-datalist.html">Previous</a><a class="btn btn-sm btn-primary" href="04-05-validation-states-feedback.html">Next</a></div>
      </div>

      <section class="row justify-content-center"><div class="col-lg-6"><form class="bg-white border rounded-3 p-4">
        <div class="form-floating mb-3"><input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com"><label for="floatingEmail">Email address</label></div>
        <div class="form-floating mb-3"><select class="form-select" id="floatingSelect"><option>Open this select menu</option><option>Support</option><option>Sales</option></select><label for="floatingSelect">Topic</label></div>
        <div class="form-floating"><textarea class="form-control" placeholder="Message" id="floatingMessage" style="height: 120px"></textarea><label for="floatingMessage">Message</label></div>
      </form></div></section>
    </main>
  </body>
</html>
