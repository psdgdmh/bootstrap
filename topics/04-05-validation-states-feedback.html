<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>04.5 Validation States and Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">04.5 Validation States and Feedback</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="04-04-floating-labels.html">Previous</a><a class="btn btn-sm btn-primary" href="04-06-comprehensive-form.html">Next</a></div>
      </div>

      <section class="row justify-content-center"><div class="col-lg-7"><form class="needs-validation bg-white border rounded-3 p-4" novalidate>
        <div class="mb-3"><label class="form-label" for="name">Name</label><input id="name" class="form-control" required><div class="valid-feedback">Looks good.</div><div class="invalid-feedback">Name is required.</div></div>
        <div class="mb-3"><label class="form-label" for="email2">Email</label><input id="email2" type="email" class="form-control" required><div class="invalid-feedback">Use a valid email.</div></div>
        <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="terms" required><label class="form-check-label" for="terms">Accept terms</label><div class="invalid-feedback">You must accept before submitting.</div></div>
        <button class="btn btn-primary">Submit</button>
      </form></div></section>
      <script>
        document.addEventListener('submit', event => {
          if (event.target.matches('.needs-validation')) {
            if (!event.target.checkValidity()) { event.preventDefault(); event.stopPropagation(); }
            event.target.classList.add('was-validated');
          }
        });
      </script>
    </main>
  </body>
</html>
