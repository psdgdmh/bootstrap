<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>07.2 Alerts, Toasts and Spinners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">07.2 Alerts, Toasts and Spinners</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="07-01-carousel-autoplay-controls.html">Previous</a><a class="btn btn-sm btn-primary" href="07-03-tooltips-popovers.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4"><div class="alert alert-success alert-dismissible fade show">Saved successfully<button class="btn-close" data-bs-dismiss="alert"></button></div><button id="showToast" class="btn btn-primary me-2">Show toast</button><button class="btn btn-dark" disabled><span class="spinner-border spinner-border-sm me-2"></span>Loading</button></section><div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="toast" class="toast"><div class="toast-header"><strong class="me-auto">Notification</strong><button class="btn-close" data-bs-dismiss="toast"></button></div><div class="toast-body">Toast message</div></div></div><script>window.addEventListener('load',()=>document.getElementById('showToast').addEventListener('click',()=>bootstrap.Toast.getOrCreateInstance(document.getElementById('toast')).show()))</script>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
