<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>04.3 Input Groups, Range and Datalist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">04.3 Input Groups, Range and Datalist</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="04-02-checks-radios-switches.html">Previous</a><a class="btn btn-sm btn-primary" href="04-04-floating-labels.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4">
        <div class="mb-4"><label class="form-label">Username</label><div class="input-group"><span class="input-group-text">@</span><input class="form-control" placeholder="username"><button class="btn btn-outline-secondary">Check</button></div></div>
        <div class="mb-4"><label for="budget" class="form-label">Budget range</label><input id="budget" class="form-range" type="range" min="0" max="100" value="65"></div>
        <div><label for="city" class="form-label">City datalist</label><input id="city" class="form-control" list="cities" placeholder="Type a city"><datalist id="cities"><option value="Bangkok"><option value="Chiang Mai"><option value="Phuket"></datalist></div>
      </section>
    </main>
  </body>
</html>
