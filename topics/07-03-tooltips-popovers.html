<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>07.3 Tooltips and Popovers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">07.3 Tooltips and Popovers</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="07-02-alerts-toasts-spinners.html">Previous</a><a class="btn btn-sm btn-primary" href="07-04-z-index-fixed-sticky-object-fit.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4"><button class="btn btn-outline-primary me-2" data-bs-toggle="tooltip" data-bs-title="Tooltip on hover/focus">Tooltip</button><button class="btn btn-primary" data-bs-toggle="popover" data-bs-title="Popover title" data-bs-content="Popover รองรับเนื้อหายาวกว่า tooltip">Popover</button></section><script>window.addEventListener('load',()=>{document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el=>new bootstrap.Tooltip(el));document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el=>new bootstrap.Popover(el));})</script>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
