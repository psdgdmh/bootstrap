<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>03.1 Buttons and Button Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">03.1 Buttons and Button Groups</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="02-04-master-product-detail-layout.html">Previous</a><a class="btn btn-sm btn-primary" href="03-02-badges-notification-positioning.html">Next</a></div>
      </div>

      <section class="bg-white border rounded-3 p-4 mb-4">
        <h2 class="h5">Button variants</h2>
        <div class="d-flex gap-2 flex-wrap mb-3">
          <button class="btn btn-primary">Primary</button><button class="btn btn-outline-primary">Outline</button><button class="btn btn-success btn-sm">Small</button><button class="btn btn-danger btn-lg">Large</button>
        </div>
        <h2 class="h5">Button group</h2>
        <div class="btn-group" role="group" aria-label="View mode">
          <input type="radio" class="btn-check" name="view" id="list" checked><label class="btn btn-outline-dark" for="list">List</label>
          <input type="radio" class="btn-check" name="view" id="grid"><label class="btn btn-outline-dark" for="grid">Grid</label>
          <input type="radio" class="btn-check" name="view" id="kanban"><label class="btn btn-outline-dark" for="kanban">Kanban</label>
        </div>
      </section>
    </main>
  </body>
