<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>06 - JavaScript Plugins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4">Back</a>
      <h1 class="h2 fw-bold">JavaScript Plugins Part 1</h1>
      <p class="text-secondary">ตัวอย่าง data attributes สำหรับ collapse, dropdown, modal และ carousel</p>

      <div class="d-flex gap-2 flex-wrap mb-4">
        <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#details">Toggle collapse</button>
        <div class="dropdown">
          <button class="btn btn-outline-dark dropdown-toggle" data-bs-toggle="dropdown">Menu</button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Export</a></li>
            <li><a class="dropdown-item" href="#">Archive</a></li>
          </ul>
        </div>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#demoModal">Open modal</button>
      </div>

      <div id="details" class="collapse mb-4">
        <div class="card card-body">Collapse ใช้ซ่อน/แสดงข้อมูลรองโดยไม่ต้องเขียน JavaScript เอง</div>
      </div>

      <div id="demoCarousel" class="carousel slide bg-dark rounded-3 overflow-hidden mb-4">
        <div class="carousel-inner text-white text-center">
          <div class="carousel-item active p-5"><h2 class="h4">Slide 1</h2></div>
          <div class="carousel-item p-5"><h2 class="h4">Slide 2</h2></div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#demoCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
        <button class="carousel-control-next" type="button" data-bs-target="#demoCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
      </div>
    </main>

    <div class="modal fade" id="demoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header"><h2 class="modal-title h5">Confirm action</h2><button class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">Modal เหมาะกับ confirmation หรือ focused task</div>
          <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
