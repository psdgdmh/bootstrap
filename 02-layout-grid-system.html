<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>02 - Layout and Grid System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4">Back</a>
      <h1 class="h2 fw-bold">Layout and Grid System</h1>
      <p class="text-secondary">ตัวอย่าง container, row, col, breakpoints และ gutters</p>

      <section class="row g-3 mb-4">
        <div class="col-12 col-md-8">
          <div class="p-4 bg-white border rounded-3 h-100">
            <h2 class="h5">Main content</h2>
            <p class="mb-0">`col-12 col-md-8` หมายถึงมือถือเต็มแถว และจอ md ขึ้นไปกิน 8 columns</p>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="p-4 bg-white border rounded-3 h-100">
            <h2 class="h5">Sidebar</h2>
            <p class="mb-0">`col-md-4` จะอยู่ข้าง main content เมื่อหน้าจอกว้างพอ</p>
          </div>
        </div>
      </section>

      <section class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-3">
        <div class="col"><div class="p-3 bg-primary text-white rounded">Feature 1</div></div>
        <div class="col"><div class="p-3 bg-success text-white rounded">Feature 2</div></div>
        <div class="col"><div class="p-3 bg-warning rounded">Feature 3</div></div>
        <div class="col"><div class="p-3 bg-danger text-white rounded">Feature 4</div></div>
      </section>
    </main>
  </body>
</html>
