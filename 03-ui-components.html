<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>03 - UI Components</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="#">UI Kit</a>
        <div class="d-flex gap-2">
          <a href="index.html" class="btn btn-sm btn-outline-light">Back</a>
          <button class="btn btn-sm btn-primary">Sign in</button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="alert alert-info" role="alert">
        Components ช่วยให้สร้าง UI มาตรฐานได้เร็ว เช่น alerts, cards, badges, buttons และ list groups
      </div>

      <section class="row g-4">
        <div class="col-md-4">
          <article class="card h-100">
            <div class="card-body">
              <span class="badge text-bg-success mb-2">New</span>
              <h2 class="h5 card-title">Starter Plan</h2>
              <p class="card-text text-secondary">เหมาะกับการสอน card structure และปุ่ม action</p>
              <button class="btn btn-outline-primary w-100">Choose plan</button>
            </div>
          </article>
        </div>
        <div class="col-md-8">
          <div class="list-group">
            <button class="list-group-item list-group-item-action active">Dashboard overview</button>
            <button class="list-group-item list-group-item-action">Customer records</button>
            <button class="list-group-item list-group-item-action">Reports and exports</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
