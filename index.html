        }

        .nav-link:hover {

        }

        .nav-link.active {

            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);

        }

        .page-header h1 {
            font-weight: 700;
            margin-bottom: 5px;
        }

        /* Stat Cards */
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-left: 5px solid;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .stat-card.card-blue { border-left-color: #667eea; }
        .stat-card.card-green { border-left-color: #10b981; }
        .stat-card.card-orange { border-left-color: #f59e0b; }
        .stat-card.card-red { border-left-color: #ef4444; }

        .stat-card h3 {
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card.card-blue h3 { color: #667eea; }
        .stat-card.card-green h3 { color: #10b981; }
        .stat-card.card-orange h3 { color: #f59e0b; }
        .stat-card.card-red h3 { color: #ef4444; }

        .stat-card p {
            color: #6b7280;
            font-weight: 500;
            margin-bottom: 0;
        }

        /* Table Styling */

            border-radius: 12px;
            padding: 25px;

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            padding: 15px;
            text-align: center;
        }

        .table tbody td {
            padding: 12px 15px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background: #f3f4f6;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        let currentYear = 2569;

        function showYear(year) {
            currentYear = year;
            document.getElementById('yearDisplay').textContent = `ข้อมูลปี ${year}`;
            
            // อัปเดต Active Link
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            event.target.classList.add('active');

            // อัปเดตตาราง
            updateTable();
            updateStats();
        }

        function updateTable() {
            const data = awardData[currentYear];
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            data.forEach(item => {
                const row = document.createElement('tr');
                let statusBadge = '';
                let statusClass = '';

                if (item.status === 'อนุมัติ') {
                    statusBadge = '<span class="badge bg-success">✓ อนุมัติ</span>';
                } else if (item.status === 'รอพิจารณา') {
                    statusBadge = '<span class="badge bg-warning text-dark">⏳ รอพิจารณา</span>';
                } else {
                    statusBadge = '<span class="badge bg-danger">✗ ไม่อนุมัติ</span>';
                }

                row.innerHTML = `
                    <td>${item.no}</td>
                    <td><strong>${item.title}</strong></td>
                    <td><span class="badge-department">${item.department}</span></td>
                    <td>${item.phone}</td>
                    <td>${statusBadge}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateStats() {
            const data = awardData[currentYear];
            const total = data.length;
            const approved = data.filter(d => d.status === 'อนุมัติ').length;
            const pending = data.filter(d => d.status === 'รอพิจารณา').length;
            const rejected = data.filter(d => d.status === 'ไม่อนุมัติ').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('approvedCount').textContent = approved;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('rejectedCount').textContent = rejected;
        }

        // โหลดข้อมูลเริ่มต้น
        updateTable();
        updateStats();
