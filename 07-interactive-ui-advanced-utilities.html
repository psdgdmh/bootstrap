<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>07 - Interactive UI and Advanced Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <main class="container py-5">
      <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4">Back</a>
      <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h1 class="h2 fw-bold mb-1">Interactive UI</h1>
          <p class="text-secondary mb-0">tabs, accordion, offcanvas, progress และ toast</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#filters">Filters</button>
      </div>

      <ul class="nav nav-tabs" id="lessonTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#overview" type="button">Overview</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tasks" type="button">Tasks</button></li>
      </ul>
      <div class="tab-content border border-top-0 p-4 mb-4">
        <div id="overview" class="tab-pane fade show active">ใช้ tabs เมื่อต้องสลับข้อมูลในพื้นที่เดียวกัน</div>
        <div id="tasks" class="tab-pane fade">ใช้ JavaScript plugin ผ่าน `data-bs-*` เป็นหลัก</div>
      </div>

      <div class="accordion mb-4" id="faq">
        <div class="accordion-item">
          <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#faqOne">Why utilities?</button></h2>
          <div id="faqOne" class="accordion-collapse collapse show" data-bs-parent="#faq"><div class="accordion-body">Utilities ช่วยแก้ spacing, display, alignment และ responsive behavior ได้เร็ว</div></div>
        </div>
      </div>

      <div class="progress mb-3" role="progressbar" aria-label="Lesson progress" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar" style="width: 70%">70%</div>
      </div>
      <button id="toastButton" class="btn btn-outline-dark">Show toast</button>
    </main>

    <aside class="offcanvas offcanvas-end" id="filters" tabindex="-1">
      <div class="offcanvas-header"><h2 class="h5">Filters</h2><button class="btn-close" data-bs-dismiss="offcanvas"></button></div>
      <div class="offcanvas-body"><div class="form-check"><input class="form-check-input" type="checkbox" id="activeOnly"><label class="form-check-label" for="activeOnly">Active only</label></div></div>
    </aside>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="demoToast" class="toast"><div class="toast-body">Saved successfully.</div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById('toastButton').addEventListener('click', () => {
        bootstrap.Toast.getOrCreateInstance(document.getElementById('demoToast')).show();
      });
    </script>
  </body>
</html>
