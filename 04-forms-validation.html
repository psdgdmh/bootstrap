<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>04 - Forms and Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4">Back</a>
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <form class="needs-validation bg-white border rounded-3 p-4" novalidate>
            <h1 class="h3 fw-bold mb-3">Contact Form</h1>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">First name</label>
                <input id="firstName" class="form-control" required>
                <div class="invalid-feedback">Please enter first name.</div>
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" class="form-control" required>
                <div class="invalid-feedback">Please enter a valid email.</div>
              </div>
              <div class="col-12">
                <label for="topic" class="form-label">Topic</label>
                <select id="topic" class="form-select" required>
                  <option value="">Choose...</option>
                  <option>Website</option>
                  <option>Training</option>
                </select>
                <div class="invalid-feedback">Please choose a topic.</div>
              </div>
              <div class="col-12">
                <label for="message" class="form-label">Message</label>
                <textarea id="message" class="form-control" rows="4" required></textarea>
                <div class="invalid-feedback">Please add a message.</div>
              </div>
            </div>
            <button class="btn btn-primary mt-4" type="submit">Submit</button>
          </form>
        </div>
      </div>
    </main>

    <script>
      document.querySelector('.needs-validation').addEventListener('submit', (event) => {
        if (!event.currentTarget.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
        }
        event.currentTarget.classList.add('was-validated');
      });
    </script>
  </body>
</html>
